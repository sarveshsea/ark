name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: 'Expected npm version after publish'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/studio/package-lock.json
      - run: |
          rm -f package-lock.json
          npm install --ignore-scripts
          npm --prefix apps/studio ci --ignore-scripts
      - run: npm run check:release
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - name: Publish npm package
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: npm publish --access public --provenance
      - name: Skip npm publish without token
        if: ${{ env.NODE_AUTH_TOKEN == '' }}
        run: |
          echo "::warning::NPM_TOKEN is not configured; skipping npm publish."
          echo "Configure the repository NPM_TOKEN secret or run npm publish from an authenticated machine."
      - name: Verify npm release
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: node scripts/verify-npm-release.mjs
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
