title: "[MCP setup] "
labels: ["mcp", "question"]
body:
  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Claude Code
        - Claude Desktop
        - Cursor
        - Codex
        - VS Code
        - Other
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Current MCP config
      description: Redact secrets before posting.
      render: json
      placeholder: |
        {
          "mcpServers": {
            "memoire": {
              "command": "memi",
              "args": ["mcp"]
            }
          }
        }
    validations:
      required: false
  - type: textarea
    id: issue
    attributes:
      label: What is not working?
    validations:
      required: true
