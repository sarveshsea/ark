<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --bg-card: #ffffff;
    --bg-hover: #f5f5f3;
    --fg: #1a1a1a;
    --fg-muted: #999;
    --fg-dim: #bbb;
    --border: rgba(0,0,0,0.07);
    --accent: #1a1a1a;
    --rose: #c0392b;
    --rose-soft: rgba(192,57,43,0.08);
    --green: #2d8a4e;
    --green-soft: rgba(45,138,78,0.08);
    --warn: #b8860b;
    --warn-soft: rgba(184,134,11,0.08);
    --error: #c0392b;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --serif: 'Cormorant Garamond', 'Georgia', serif;
    --radius: 4px;
  }

  body {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Top Bar ────────────────────────────────────── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .brand-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    transition: opacity 0.3s;
  }

  .brand-icon.live { opacity: 1; }
  .brand-icon.scanning { opacity: 0.5; animation: pulse 2s ease-in-out infinite; }
  .brand-icon.dead { opacity: 0.2; }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.2; }
  }

  .brand-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 1px;
    color: var(--fg);
  }

  .brand-status {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .brand-status.live { color: var(--green); background: var(--green-soft); }
  .brand-status.scanning { color: var(--warn); background: var(--warn-soft); }
  .brand-status.dead { color: var(--fg-muted); background: rgba(0,0,0,0.04); }

  .top-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .file-name {
    font-size: 9px;
    color: var(--fg-muted);
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .conn-quality {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .conn-quality.healthy { background: var(--green); }
  .conn-quality.degraded { background: var(--warn); }
  .conn-quality.reconnecting { background: var(--warn); animation: blink 1.2s ease-in-out infinite; }
  .conn-quality.disconnected { background: #ddd; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .minimize-btn {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--fg-dim);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
  }
  .minimize-btn:hover { border-color: var(--fg-muted); color: var(--fg); }

  /* ── Stats Row ──────────────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat-card {
    background: var(--bg);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-dim);
    font-weight: 500;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
    line-height: 1.2;
  }

  .stat-sub {
    font-size: 8px;
    color: var(--fg-muted);
  }

  /* ── Connection Card (offline/scanning) ─────────── */
  .conn-card { display: none; }
  .conn-card.visible {
    display: block;
    padding: 14px 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    flex-shrink: 0;
  }

  .help-text {
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    color: var(--fg-muted);
    line-height: 1.6;
  }

  .help-text code {
    font-family: var(--mono);
    font-size: 9px;
    font-style: normal;
    background: var(--bg-hover);
    padding: 2px 5px;
    border-radius: 2px;
    color: var(--fg);
  }

  .retry-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 3px;
  }
  .retry-btn:hover { border-color: var(--fg); color: var(--fg); }

  /* ── Port Grid ──────────────────────────────────── */
  .port-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .port-grid-label {
    grid-column: 1 / -1;
    font-family: var(--serif);
    font-size: 11px;
    font-style: italic;
    color: var(--fg-dim);
    margin-bottom: 2px;
  }

  .port-cell {
    text-align: center;
    padding: 4px 2px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 9px;
    font-variant-numeric: tabular-nums;
    color: var(--fg-muted);
    transition: all 0.2s;
  }

  .port-cell.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-soft);
    font-weight: 500;
  }

  .port-cell.fc-active {
    border-color: var(--warn);
    color: var(--warn);
    background: var(--warn-soft);
  }

  /* ── Tabs ───────────────────────────────────────── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 6px;
    text-align: center;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--fg-dim);
    border: none;
    border-bottom: 1.5px solid transparent;
    background: none;
    font-family: var(--mono);
    transition: all 0.15s;
  }

  .tab:hover { color: var(--fg-muted); }
  .tab.active { color: var(--fg); border-bottom-color: var(--fg); }

  /* ── Panels ─────────────────────────────────────── */
  .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .panel.active { display: flex; }

  /* ── Log Panel ──────────────────────────────────── */
  .log-counter {
    padding: 5px 12px;
    font-size: 8px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .log {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .log-entry {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 3px 12px;
    font-size: 10px;
    transition: background 0.1s;
  }

  .log-entry:hover { background: var(--bg-hover); }

  .log-time {
    color: var(--fg-dim);
    flex-shrink: 0;
    font-size: 9px;
    font-variant-numeric: tabular-nums;
  }

  .log-icon {
    flex-shrink: 0;
    width: 10px;
    text-align: center;
    font-weight: 600;
  }

  .log-msg { flex: 1; word-break: break-word; color: var(--fg); }

  .log-entry.ok .log-icon { color: var(--green); }
  .log-entry.warn .log-icon { color: var(--warn); }
  .log-entry.err .log-icon { color: var(--error); }
  .log-entry.info .log-icon { color: var(--fg-dim); }

  .log-entry .log-detail {
    flex-basis: 100%;
    font-size: 9px;
    color: var(--fg-muted);
    margin-top: 1px;
    padding-left: 16px;
    word-break: break-all;
    max-height: 60px;
    overflow-y: auto;
  }

  .log-entry .log-badge {
    display: inline-block;
    font-size: 7px;
    padding: 0 3px;
    border: 1px solid var(--border);
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--fg-muted);
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ── Actions Panel ──────────────────────────────── */
  .actions {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
  }

  .action-section {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--fg-dim);
    margin-top: 10px;
    margin-bottom: 4px;
  }

  .action-section:first-child { margin-top: 0; }

  .action-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .action-pill {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--fg-muted);
    background: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .action-pill:hover {
    border-color: var(--fg);
    color: var(--fg);
    background: var(--bg-hover);
  }

  .action-pill:active { transform: scale(0.97); }
  .action-pill.disabled { opacity: 0.3; pointer-events: none; }

  /* ── Selection Panel ────────────────────────────── */
  .sel-panel {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
  }

  .sel-empty {
    text-align: center;
    color: var(--fg-dim);
    padding: 30px 20px;
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    line-height: 2;
  }

  .sel-node {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    background: var(--bg-card);
  }

  .sel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .sel-name { font-weight: 500; font-size: 10px; }
  .sel-type {
    font-size: 8px;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sel-props {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1px 8px;
    font-size: 9px;
    color: var(--fg-muted);
  }

  .sel-props .k { color: var(--fg); font-weight: 500; }

  /* ── Scrollbar ──────────────────────────────────── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #ccc; }

  /* ── Minimize ───────────────────────────────────── */
  body.minimized .stats-row,
  body.minimized .conn-card,
  body.minimized .port-grid,
  body.minimized .tabs,
  body.minimized .panel { display: none !important; }
  body.minimized { height: auto; }
  body.minimized .top-bar { border-bottom: none; }

  /* ── Hidden helper for status-detail compatibility ── */
  .status-detail { display: none; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="brand">
    <svg class="brand-icon dead" id="statusDot" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
      <circle cx="7" cy="4" r="1.2" fill="#c0392b"/>
      <circle cx="4.5" cy="5.5" r="1.2" fill="#c0392b"/>
      <circle cx="9.5" cy="5.5" r="1.2" fill="#c0392b"/>
      <circle cx="5.5" cy="3.2" r="1.2" fill="#d35649"/>
      <circle cx="8.5" cy="3.2" r="1.2" fill="#d35649"/>
      <circle cx="7" cy="6" r="1.6" fill="#a02018"/>
      <line x1="7" y1="7.5" x2="7" y2="12.5" stroke="#6b8a6b" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="7" y1="10" x2="5" y2="8.5" stroke="#6b8a6b" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="7" y1="11" x2="9" y2="9.5" stroke="#6b8a6b" stroke-width="0.8" stroke-linecap="round"/>

<!-- Stats Row -->
<div class="stats-row" id="statsRow">

    <div class="stat-label">Port</div>

    <div class="stat-sub">bridge</div>
  </div>

  <div class="port-cell" id="port-9225">9225</div>
  <div class="port-cell" id="port-9226">9226</div>
  <div class="port-cell" id="port-9227">9227</div>
  <div class="port-cell" id="port-9228">9228</div>
  <div class="port-cell" id="port-9229">9229</div>
  <div class="port-cell" id="port-9230">9230</div>

<!-- Tabs -->

  <button class="tab" data-tab="actions" onclick="switchTab('actions')">Actions</button>

<div class="panel" id="panel-actions">

    <div class="action-pills">
      <button class="action-pill" onclick="act('pull-tokens')">Tokens</button>

  </div>

<!-- Hidden compat elements -->

  <span id="detailClients" style="display:none">0</span>
  <span id="detailQueue" style="display:none">0</span>
</div>

<script>
// ── State ───────────────────────────────────────────
let ws = null;           // Mémoire CLI connection
let fcWs = null;         // figma-console MCP connection
let status = 'dead';     // dead | scanning | live
let fcStatus = 'dead';   // dead | live
let connPort = 0;
let fcPort = 0;
let connName = '';
let connectedAt = null;
let fileInfo = {};
let scanTimer = null;
let minimized = false;
let logCount = { total: 0, ok: 0, warn: 0, err: 0, info: 0 };
let sessionStart = Date.now();
let sessionTimer = null;
const PORT_START = 9223;
const PORT_END = 9232;
let currentScanPort = PORT_START;

// Track pending figma-console commands for response routing
const fcPending = new Map(); // id → true

// ── Heartbeat / Keep-alive ──────────────────────────
let memoireHeartbeat = null;
let fcHeartbeat = null;
let memoireMissedPongs = 0;
let fcMissedPongs = 0;
const HEARTBEAT_MS = 10000;   // ping every 10s
const MAX_MISSED = 3;         // 3 missed = dead
let reconnectDelay = 1000;    // backoff start
const MAX_RECONNECT_DELAY = 16000;

// ── Latency Tracking ────────────────────────────────
let memoirePingSentAt = 0;
let memoireLatencyHistory = [];  // last 10 ping latencies
let lastPingLatency = 0;
const LATENCY_HISTORY_SIZE = 10;
const HIGH_LATENCY_THRESHOLD = 500; // ms
let latencyWarned = false;

function recordLatency(ms) {
  lastPingLatency = ms;
  memoireLatencyHistory.push(ms);
  if (memoireLatencyHistory.length > LATENCY_HISTORY_SIZE) {
    memoireLatencyHistory.shift();
  }
  const avg = memoireLatencyHistory.reduce((a, b) => a + b, 0) / memoireLatencyHistory.length;
  if (avg > HIGH_LATENCY_THRESHOLD && !latencyWarned) {
    latencyWarned = true;
    log('warn', 'High avg latency: ' + avg.toFixed(0) + 'ms — connection may be degraded');
    updateConnectionQuality('degraded');
  } else if (avg <= HIGH_LATENCY_THRESHOLD && latencyWarned) {
    latencyWarned = false;
    updateConnectionQuality('healthy');
  }
  updateStatusBar();
}

function getAvgLatency() {
  if (memoireLatencyHistory.length === 0) return 0;
  return memoireLatencyHistory.reduce((a, b) => a + b, 0) / memoireLatencyHistory.length;
}

// ── Connection Quality Indicator ─────────────────────
let connQualityState = 'disconnected';

function updateConnectionQuality(state) {
  connQualityState = state;
  const dot = document.getElementById('connQuality');
  if (dot) {
    dot.className = 'conn-quality ' + state;
    const titles = {
      healthy: 'Connected — healthy',
      degraded: 'Connected — high latency',
      reconnecting: 'Reconnecting...',
      disconnected: 'Disconnected'
    };
    dot.title = titles[state] || state;
  }
}

function updateStatusBar() {
  const portEl = document.getElementById('detailPort');
  const clientsEl = document.getElementById('detailClients');
  const latencyEl = document.getElementById('detailLatency');
  const queueEl = document.getElementById('detailQueue');
  const pingQEl = document.getElementById('pingQuality');

  if (portEl) portEl.textContent = connPort > 0 ? ':' + connPort : '--';

  if (clientsEl) {
    let clients = 0;
    if (status === 'live') clients++;
    if (fcStatus === 'live') clients++;
    clientsEl.textContent = String(clients);
  }

  if (latencyEl) {
    if (lastPingLatency > 0) {
      latencyEl.textContent = lastPingLatency + 'ms';
      latencyEl.style.color = lastPingLatency > HIGH_LATENCY_THRESHOLD ? 'var(--warn)' : '';
    } else {
      latencyEl.textContent = '--';
      latencyEl.style.color = '';
    }
  }

  if (pingQEl) {
    if (lastPingLatency > 0) {
      pingQEl.textContent = lastPingLatency < 100 ? 'healthy' : lastPingLatency < HIGH_LATENCY_THRESHOLD ? 'ok' : 'slow';
    } else {
      pingQEl.textContent = status === 'live' ? 'measuring' : 'waiting';
    }
  }

  if (queueEl) {
    queueEl.textContent = String(commandQueue.length);
  }

  // Update port grid
  updatePortGrid();

  // Update stat events
  const evtEl = document.getElementById('statEvents');
  if (evtEl) evtEl.textContent = String(logCount.total);
}

function updatePortGrid() {
  for (let p = PORT_START; p <= PORT_END; p++) {
    const cell = document.getElementById('port-' + p);
    if (!cell) continue;
    cell.className = 'port-cell';
    if (p === connPort) cell.classList.add('active');
    else if (p === fcPort) cell.classList.add('fc-active');
  }
}

// ── Command Queue (offline buffering) ───────────────
const commandQueue = [];
const MAX_QUEUED_COMMANDS = 50;

function queueCommand(msg) {
  if (commandQueue.length >= MAX_QUEUED_COMMANDS) {
    commandQueue.shift();
  }
  commandQueue.push(msg);
  log('info', 'Queued command (' + commandQueue.length + '/' + MAX_QUEUED_COMMANDS + '): ' + (msg.method || msg.type || 'unknown'));
}

function replayCommandQueue() {
  if (commandQueue.length === 0) return;
  const count = commandQueue.length;
  log('info', 'Replaying ' + count + ' queued command' + (count !== 1 ? 's' : '') + '...');
  while (commandQueue.length > 0) {
    const msg = commandQueue.shift();
    parent.postMessage({ pluginMessage: msg }, '*');
  }
  log('ok', 'Replayed ' + count + ' queued command' + (count !== 1 ? 's' : ''));
}

function startMemoireHeartbeat() {
  clearInterval(memoireHeartbeat);
  memoireMissedPongs = 0;
  memoireLatencyHistory = [];
  latencyWarned = false;
  memoireHeartbeat = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    memoireMissedPongs++;
    if (memoireMissedPongs >= MAX_MISSED) {
      log('warn', 'Heartbeat timeout (' + MAX_MISSED + ' missed) — reconnecting');
      updateConnectionQuality('disconnected');
      ws.close();
      return;
    }
    memoirePingSentAt = Date.now();
    try { ws.send(JSON.stringify({ type: 'ping' })); } catch {}
  }, HEARTBEAT_MS);
}

function startFcHeartbeat() {
  clearInterval(fcHeartbeat);
  fcMissedPongs = 0;
  fcHeartbeat = setInterval(() => {
    if (!fcWs || fcWs.readyState !== WebSocket.OPEN) return;
    fcMissedPongs++;
    if (fcMissedPongs >= MAX_MISSED) {
      log('warn', 'Figma Console heartbeat timeout (' + MAX_MISSED + ' missed) — reconnecting');
      fcWs.close();
      return;
    }
    try { fcWs.send(JSON.stringify({ type: 'ping' })); } catch {}
  }, HEARTBEAT_MS);
}

// ── Connection (multi-protocol scanning) ────────────
function scan() {
  if (status === 'live' && fcStatus === 'live') return;
  if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }
  if (status !== 'live') setStatus('scanning');
  currentScanPort = PORT_START;
  tryNext();
}

function scheduleReconnect() {
  if (scanTimer) return;
  log('info', 'Reconnecting in ' + (reconnectDelay / 1000).toFixed(1) + 's...');
  updateConnectionQuality('reconnecting');
  scanTimer = setTimeout(() => {
    scanTimer = null;
    scan();
  }, reconnectDelay);
  reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
}

function resetBackoff() {
  reconnectDelay = 1000;
}

function tryNext() {
  if (currentScanPort > PORT_END) {
    if (status !== 'live') {
      setStatus('dead');
    }
    renderConn();
    scheduleReconnect();
    return;
  }

  const port = currentScanPort++;

  if (port === connPort || port === fcPort) {
    tryNext();
    return;
  }

  try {
    const sock = new WebSocket('ws://localhost:' + port);
    let identified = false;
    let identifyTimeout = null;
    let connectTimeout = null;

    connectTimeout = setTimeout(() => {
      if (!identified) {
        identified = true;
        try { sock.close(); } catch {}
        tryNext();
      }
    }, 2000);

    function cleanup() {
      if (identifyTimeout) { clearTimeout(identifyTimeout); identifyTimeout = null; }
      if (connectTimeout) { clearTimeout(connectTimeout); connectTimeout = null; }
    }

    sock.onopen = () => {
      identifyTimeout = setTimeout(() => {
        if (!identified) {
          identified = true;
          cleanup();
          try { sock.close(); } catch {}
          tryNext();
        }
      }, 800);
    };

    sock.onmessage = (e) => {
      let data;
      try { data = JSON.parse(e.data); } catch { return; }

      if (sock === ws) {
        memoireMissedPongs = 0;
        if (memoirePingSentAt > 0) {
          recordLatency(Date.now() - memoirePingSentAt);
          memoirePingSentAt = 0;
        }
      }
      if (sock === fcWs) fcMissedPongs = 0;

      if (!identified) {
        identified = true;
        cleanup();
        if (data.type === 'SERVER_HELLO') {
          adoptAsFigmaConsole(sock, port, data);
        } else if (data.type === 'identify' || data.type === 'pong' || data.name) {
          adoptAsMemoire(sock, port);
          handleMsg(data);
        } else {
          try { sock.close(); } catch {}
          tryNext();
        }
        return;
      }

      if (sock === ws) {
        handleMsg(data);
      } else if (sock === fcWs) {
        handleFcMsg(data);
      }
    };

    sock.onclose = () => {
      cleanup();
      if (sock === ws) {
        ws = null;
        connPort = 0;
        clearInterval(memoireHeartbeat);
        setStatus('dead');
        renderConn();
        log('warn', 'Disconnected from Memoire');
        scheduleReconnect();
      } else if (sock === fcWs) {
        fcWs = null;
        fcPort = 0;
        clearInterval(fcHeartbeat);
        fcStatus = 'dead';
        renderConn();
        log('warn', 'Figma Console MCP disconnected');
        scheduleReconnect();
      } else if (!identified) {
        identified = true;
        tryNext();
      }
    };

    sock.onerror = () => {
      cleanup();
      if (!identified) {
        identified = true;
        try { sock.close(); } catch {}
        tryNext();
      }
    };
  } catch {
    tryNext();
  }
}

function adoptAsMemoire(sock, port) {
  if (status === 'live') {
    sock.close();
    tryNext();
    return;
  }

  ws = sock;
  connPort = port;
  connectedAt = new Date();
  setStatus('live');
  resetBackoff();
  startMemoireHeartbeat();
  updateConnectionQuality('healthy');
  renderConn();
  log('ok', 'Connected to Memoire on port ' + port);

  if (commandQueue.length > 0) {
    setTimeout(() => replayCommandQueue(), 200);
  }

  sock.send(JSON.stringify({
    type: 'bridge-hello',
    plugin: 'memoire',
    file: fileInfo.file || 'unknown',
    fileKey: fileInfo.fileKey || '',
    editor: fileInfo.editor || 'figma',
  }));

  if (fcStatus !== 'live') tryNext();
}

function adoptAsFigmaConsole(sock, port, hello) {
  if (fcStatus === 'live') {
    sock.close();
    tryNext();
    return;
  }

  fcWs = sock;
  fcPort = port;
  fcStatus = 'live';
  resetBackoff();
  startFcHeartbeat();
  renderConn();
  log('ok', 'Figma Console MCP on port ' + port);

  sock.send(JSON.stringify({
    type: 'FILE_INFO',
    data: {
      fileName: fileInfo.file || figmaFileName || 'unknown',
      fileKey: fileInfo.fileKey || '',
      currentPage: fileInfo.page || '',
      currentPageId: '',
      editorType: fileInfo.editor || 'figma',
      pluginVersion: '1.0.0',
    }
  }));

  if (status !== 'live') tryNext();
}

function disconnect() {
  clearInterval(memoireHeartbeat);
  clearInterval(fcHeartbeat);
  clearTimeout(scanTimer);
  scanTimer = null;
  if (ws) ws.close();
  ws = null;
  connPort = 0;
  setStatus('dead');
  if (fcWs) fcWs.close();
  fcWs = null;
  fcPort = 0;
  fcStatus = 'dead';
  lastPingLatency = 0;
  memoireLatencyHistory = [];
  updateConnectionQuality('disconnected');
  renderConn();
}

// ── Figma Console MCP Protocol ──────────────────────
window.__figmaVariablesData = null;
window.__figmaVariablesReady = false;
window.__figmaPendingRequests = new Map();

function handleFcMsg(msg) {
  if (msg.id && msg.method) {
    const fcId = msg.id;
    const method = msg.method;
    const params = msg.params || {};

    fcPending.set(fcId, true);

    const pluginMsg = Object.assign({ type: method, requestId: fcId }, params);
    parent.postMessage({ pluginMessage: pluginMsg }, '*');

    log('info', 'FC ' + method, Object.keys(params).length ? params : null);
    return;
  }

  if (msg.type === 'SERVER_HELLO') return;

  if (msg.type === 'RESIZE_UI' || msg.type === 'BOOT_LOAD_UI' || msg.type === 'RELOAD_UI' || msg.type === 'BOOT_FALLBACK') {
    return;
  }
}

function fcBroadcast(data) {
  if (fcWs && fcWs.readyState === WebSocket.OPEN) {
    fcWs.send(JSON.stringify(data));
  }
}

let figmaFileName = '';

function setStatus(s) {
  status = s;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'brand-icon ' + s;
  txt.className = 'brand-status ' + s;

  if (s === 'live') {
    txt.textContent = 'connected';
    updateConnectionQuality('healthy');
  } else if (s === 'scanning') {
    txt.textContent = 'scanning';
    updateConnectionQuality('reconnecting');
  } else {
    txt.textContent = 'offline';
    updateConnectionQuality('disconnected');
  }
  updateStatusBar();
}

// ── Connection Card Rendering ───────────────────────

function renderConn() {
  const el = document.getElementById('connCard');
  let html = '';

  if (status === 'live') {
    // Hide conn card when connected — stats row handles it
    el.className = 'conn-card';
    el.innerHTML = '';
  } else if (status === 'scanning') {
    el.className = 'conn-card visible';
    el.innerHTML = '<div class="help-text">Scanning ports ' + PORT_START + '–' + PORT_END + '...</div>';
  } else {
    el.className = 'conn-card visible';
    el.innerHTML =
      '<div class="help-text">No instance found.<br>Run <code>memi connect</code> in terminal.</div>' +
      '<button class="retry-btn" onclick="scan()">Retry</button>';
  }

  updateStatusBar();
}

// ── Message Handling ────────────────────────────────

function handleMsg(msg) {
  if (msg.type === 'command' && msg.id && msg.method) {
    parent.postMessage({
      pluginMessage: {
        type: 'command',
        id: msg.id,
        method: msg.method,
        params: msg.params || {},
      }
    }, '*');
    log('info', 'CMD ' + msg.method, msg.params && Object.keys(msg.params).length ? msg.params : null);
    return;
  }

  if (msg.type === 'identify') {
    connName = msg.name || connName;
    renderConn();
    log('ok', 'Identified: ' + (msg.name || 'Memoire'));
    return;
  }

  if (msg.type === 'chat') {
    log('info', '[' + (msg.from || 'memoire') + '] ' + msg.text);
    return;
  }

  if (msg.type === 'event') {
    const level = msg.level === 'success' ? 'ok' : msg.level === 'error' ? 'err' : msg.level || 'info';
    log(level, msg.message, msg.data || null);
    return;
  }

  if (msg.type === 'error') {
    log('err', msg.message, msg.details || null);
    return;
  }

  log('info', 'MSG:' + msg.type, msg.data || null);
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
    return true;
  }
  if (data && data.type === 'command' || (data && data.method)) {
    queueCommand(data);
  }
  return false;
}

// ── Actions ─────────────────────────────────────────

function act(action) {
  if (status !== 'live') {
    log('warn', 'Not connected — run memi connect first');
    return;
  }

  log('info', 'Running: ' + action);

  const cmds = {
    'pull-tokens':      { method: 'getVariables', params: {} },
    'pull-components':  { method: 'getComponents', params: {} },
    'pull-styles':      { method: 'getStyles', params: {} },
    'stickies':         { method: 'getStickies', params: {} },
    'selection-info':   { method: 'getSelection', params: {} },
    'page-tree':        { method: 'getPageTree', params: { depth: 2 } },
  };

  if (action === 'full-sync') {
    parent.postMessage({ pluginMessage: { type: 'command', id: 'sync:tokens', method: 'getVariables', params: {} } }, '*');
    parent.postMessage({ pluginMessage: { type: 'command', id: 'sync:components', method: 'getComponents', params: {} } }, '*');
    parent.postMessage({ pluginMessage: { type: 'command', id: 'sync:styles', method: 'getStyles', params: {} } }, '*');
    return;
  }

  if (action === 'selection-info') {
    parent.postMessage({ pluginMessage: { type: 'command', id: 'action:selection', method: 'getSelection', params: {} } }, '*');
    switchTab('selection');
    return;
  }

  const cmd = cmds[action];
  if (cmd) {
    parent.postMessage({ pluginMessage: { type: 'command', id: 'action:' + action, method: cmd.method, params: cmd.params } }, '*');
  }
}

// ── Selection Rendering ─────────────────────────────

function renderSel(nodes) {
  const panel = document.getElementById('selPanel');

  if (!nodes || nodes.length === 0) {
    panel.innerHTML = '<div class="sel-empty">Select something in Figma<br>to inspect it here</div>';
    return;
  }

  panel.innerHTML = '';
  for (const n of nodes) {
    const el = document.createElement('div');
    el.className = 'sel-node';

    const props = [
      ['id', n.id],
      ['x', n.x != null ? n.x.toFixed(0) : null],
      ['y', n.y != null ? n.y.toFixed(0) : null],
      ['w', n.width != null ? n.width.toFixed(0) : null],
      ['h', n.height != null ? n.height.toFixed(0) : null],
    ];
    if (n.characters) props.push(['text', n.characters.slice(0, 50)]);
    if (n.opacity != null && n.opacity < 1) props.push(['opacity', n.opacity.toFixed(2)]);
    if (n.childCount) props.push(['children', n.childCount]);

    let propsHtml = '';
    for (const [k, v] of props) {
      if (v != null) propsHtml += '<span class="k">' + k + '</span><span>' + esc(String(v)) + '</span>';
    }

    el.innerHTML =
      '<div class="sel-header">' +
        '<span class="sel-name">' + esc(n.name) + '</span>' +
        '<span class="sel-type">' + n.type + '</span>' +
      '</div>' +
      '<div class="sel-props">' + propsHtml + '</div>';
    panel.appendChild(el);
  }
}

// ── Log ─────────────────────────────────────────────

function log(level, msg, detail) {
  const el = document.getElementById('logEl');
  const icons = { ok: '+', warn: '!', err: 'x', info: '.' };

  const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;

  const entry = document.createElement('div');
  entry.className = 'log-entry ' + level;

  let html =
    '<span class="log-time">' + timeStr() + '</span>' +
    '<span class="log-icon">' + (icons[level] || '.') + '</span>' +
    '<span class="log-msg">' + esc(msg) + '</span>';

  if (detail) {
    const detailStr = typeof detail === 'object' ? JSON.stringify(detail, null, 2) : String(detail);
    html += '<div class="log-detail">' + esc(detailStr) + '</div>';
  }

  entry.innerHTML = html;
  el.appendChild(entry);

  if (wasAtBottom) {
    requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
  }

  while (el.children.length > 500) el.removeChild(el.firstChild);

  logCount.total++;
  if (logCount[level] !== undefined) logCount[level]++;
  updateLogStats();
}

function updateLogStats() {
  const stats = document.getElementById('logStats');
  if (stats) {
    stats.textContent = logCount.total + ' events  ' + logCount.ok + '+ ' + logCount.warn + '! ' + logCount.err + 'x';
  }
  const evtEl = document.getElementById('statEvents');
  if (evtEl) evtEl.textContent = String(logCount.total);
}

function updateSessionTimer() {
  const el = document.getElementById('logSession');
  if (el) {
    const s = Math.floor((Date.now() - sessionStart) / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    el.textContent = m + ':' + String(sec).padStart(2, '0');
  }
}

function toggleMinimize() {
  minimized = !minimized;
  document.body.classList.toggle('minimized', minimized);
  const btn = document.getElementById('minimizeBtn');
  btn.textContent = minimized ? '+' : '_';
  btn.title = minimized ? 'Expand' : 'Minimize';
}

// ── Tab Switching ───────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab[data-tab="' + name + '"]').classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── Plugin Message Handler ──────────────────────────

onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  switch (msg.type) {
    case 'ready':
      log('ok', 'Plugin loaded — ' + (msg.data.pages || 0) + ' pages', msg.data);
      break;

    case 'pong': {
      fileInfo = msg.data;
      figmaFileName = msg.data.file || '';
      document.getElementById('fileName').textContent = figmaFileName;
      log('info', 'File: ' + (msg.data.file || 'untitled'), { editor: msg.data.editor, fileKey: msg.data.fileKey });
      break;
    }

    case 'VARIABLES_DATA': {
      window.__figmaVariablesData = msg.data;
      window.__figmaVariablesReady = true;
      fcBroadcast({ type: 'VARIABLES_DATA', data: msg.data });
      break;
    }

    case 'CONSOLE_CAPTURE': {
      fcBroadcast({ type: 'CONSOLE_CAPTURE', level: msg.level, message: msg.message, args: msg.args, timestamp: msg.timestamp });
      break;
    }

    case 'COMPONENT_DATA': {
      const cdRid = msg.requestId;
      if (cdRid && fcPending.has(cdRid)) {
        fcPending.delete(cdRid);
        fcBroadcast({ id: cdRid, result: msg.data });
        log('ok', 'FC component data');
      }
      break;
    }

    case 'COMPONENT_ERROR': {
      const ceRid = msg.requestId;
      if (ceRid && fcPending.has(ceRid)) {
        fcPending.delete(ceRid);
        fcBroadcast({ id: ceRid, error: msg.error });
        log('err', 'FC component error: ' + msg.error);
      }
      break;
    }

    case 'selection-changed': {
      const nodes = msg.data.nodes || [];
      renderSel(nodes);
      send({ type: 'selection', data: msg.data });
      if (nodes.length > 0) {
        const names = nodes.map(n => n.name).join(', ');
        log('info', 'Selection: ' + nodes.length + ' node' + (nodes.length > 1 ? 's' : '') + ' — ' + names);
      }
      fcBroadcast({
        type: 'SELECTION_CHANGE',
        data: {
          selectedNodeIds: nodes.map(n => n.id),
          selectedNodeCount: nodes.length,
        }
      });
      break;
    }

    case 'page-changed':
      log('info', 'Page > ' + msg.data.page, msg.data);
      send({ type: 'page-changed', data: msg.data });
      fcBroadcast({
        type: 'PAGE_CHANGE',
        data: {
          pageName: msg.data.page,
          pageId: msg.data.pageId || '',
        }
      });
      fcBroadcast({
        type: 'FILE_INFO',
        data: {
          fileName: figmaFileName,
          fileKey: fileInfo.fileKey || '',
          currentPage: msg.data.page,
          currentPageId: msg.data.pageId || '',
          editorType: fileInfo.editor || 'figma',
          pluginVersion: '1.0.0',
        }
      });
      break;

    case 'document-changed': {
      const changeCount = msg.data.changes || 0;
      log('info', 'Document changed — ' + changeCount + ' change' + (changeCount !== 1 ? 's' : ''));
      send({ type: 'document-changed', data: msg.data });
      fcBroadcast({
        type: 'DOCUMENT_CHANGE',
        data: {
          hasNodeChanges: true,
          changeCount: changeCount,
          timestamp: Date.now(),
        }
      });
      break;
    }

    case 'command-response': {
      const id = msg.id;
      const resultSize = msg.result ? JSON.stringify(msg.result).length : 0;
      const sizeLabel = resultSize > 1024 ? (resultSize / 1024).toFixed(1) + 'KB' : resultSize + 'B';

      if (id && id.startsWith('fc:')) {
        const origId = fcPending.get(id);
        fcPending.delete(id);
        if (origId) {
          const resp = { id: origId };
          if (msg.error) {
            resp.error = msg.error;
            log('err', 'FC error: ' + msg.error);
          } else {
            resp.result = msg.result;
            log('ok', 'FC response (' + sizeLabel + ')');
          }
          fcBroadcast(resp);
        }
        return;
      }

      if (id && !id.includes(':')) {
        if (send({ type: 'response', id, result: msg.result, error: msg.error })) {
          log('ok', 'Response > ' + id + ' (' + sizeLabel + ')');
        }
        if (msg.error) log('err', 'Error in ' + id, msg.error);
        return;
      }

      if (id && id.startsWith('action:')) {
        const action = id.replace('action:', '');
        if (msg.error) {
          log('err', 'Failed: ' + action, msg.error);
        } else {
          log('ok', 'Done: ' + action + ' (' + sizeLabel + ')');
        }
        send({ type: 'action-result', action, result: msg.result, error: msg.error });
      }

      if (id && id.startsWith('sync:')) {
        const part = id.replace('sync:', '');
        if (msg.error) {
          log('err', 'Sync failed: ' + part, msg.error);
        } else {
          log('ok', 'Synced: ' + part + ' (' + sizeLabel + ')');
        }
        send({ type: 'sync-data', part, result: msg.result, error: msg.error });
      }

      break;
    }

    default: {
      const msgType = msg.type || '';
      if (msgType.endsWith('_RESULT') && msg.requestId && fcPending.has(msg.requestId)) {
        fcPending.delete(msg.requestId);
        const resp = { id: msg.requestId };
        if (msg.success === false) {
          resp.error = msg.error || 'Unknown error';
          log('err', 'FC: ' + msgType.replace('_RESULT', ''), msg.error);
        } else {
          const result = {};
          for (const key in msg) {
            if (key !== 'type' && key !== 'requestId' && key !== 'success') {
              result[key] = msg[key];
            }
          }
          resp.result = result;
          log('ok', 'FC < ' + msgType.replace('_RESULT', ''));
        }
        fcBroadcast(resp);
      }
      else if (msgType === 'SELECTION_CHANGE' || msgType === 'PAGE_CHANGE' || msgType === 'DOCUMENT_CHANGE') {
        fcBroadcast(msg);
      }
      break;
    }
  }
};

// ── Helpers ─────────────────────────────────────────

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function timeStr() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function timeSince(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

// ── Init ────────────────────────────────────────────

parent.postMessage({ pluginMessage: { type: 'ping' } }, '*');
renderConn();
log('info', 'Memoire starting...');

sessionTimer = setInterval(updateSessionTimer, 1000);

setTimeout(scan, 300);
