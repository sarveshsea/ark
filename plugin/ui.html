<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --bg-card: #ffffff;
    --bg-hover: #f5f5f3;
    --fg: #1a1a1a;
    --fg-muted: #999;
    --fg-dim: #bbb;
    --border: rgba(0,0,0,0.07);
    --accent: #1a1a1a;
    --rose: #c0392b;
    --rose-soft: rgba(192,57,43,0.08);
    --green: #2d8a4e;
    --green-soft: rgba(45,138,78,0.08);
    --warn: #b8860b;
    --warn-soft: rgba(184,134,11,0.08);
    --error: #c0392b;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --serif: 'Cormorant Garamond', 'Georgia', serif;
    --radius: 4px;
  }

  body {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Top Bar ────────────────────────────────────── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .brand-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    transition: opacity 0.3s;
  }

  .brand-icon.live { opacity: 1; }
  .brand-icon.scanning { opacity: 0.5; animation: pulse 2s ease-in-out infinite; }
  .brand-icon.dead { opacity: 0.2; }

  .brand-icon.just-connected {
    animation: connect-flash 0.6s ease-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.2; }
  }

  @keyframes connect-flash {
    0% { filter: brightness(1); transform: scale(1); }
    30% { filter: brightness(1.5); transform: scale(1.3); }
    100% { filter: brightness(1); transform: scale(1); }
  }

  .brand-name {
    font-family: var(--serif);
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 1px;
    color: var(--fg);
  }

  .brand-status {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: lowercase;
    transition: all 0.2s;
  }

  .brand-status.live { color: var(--green); background: var(--green-soft); }
  .brand-status.scanning { color: var(--warn); background: var(--warn-soft); }
  .brand-status.dead { color: var(--fg-muted); background: rgba(0,0,0,0.04); }

  .top-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .file-name {
    font-size: 9px;
    color: var(--fg-muted);
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .conn-quality {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .conn-quality.healthy { background: var(--green); }
  .conn-quality.degraded { background: var(--warn); }
  .conn-quality.reconnecting { background: var(--warn); animation: blink 1.2s ease-in-out infinite; }
  .conn-quality.disconnected { background: #ddd; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .minimize-btn {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--fg-dim);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .minimize-btn:hover { border-color: var(--fg-muted); color: var(--fg); }

  /* ── Stats Row ──────────────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .stat-card {
    background: var(--bg);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat-label {
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--fg-dim);
    font-weight: 500;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
    line-height: 1.2;
    transition: color 0.2s;
  }

  .stat-value.changed {
    color: var(--green);
  }

  .stat-sub {
    font-size: 8px;
    color: var(--fg-muted);
    transition: color 0.2s;
  }

  /* ── Connection Card (offline/scanning) ─────────── */
  .conn-card { display: none; }
  .conn-card.visible {
    display: block;
    padding: 14px 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    flex-shrink: 0;
  }

  .help-text {
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    color: var(--fg-muted);
    line-height: 1.6;
  }

  .help-text code {
    font-family: var(--mono);
    font-size: 9px;
    font-style: normal;
    background: var(--bg-hover);
    padding: 2px 5px;
    border-radius: 2px;
    color: var(--fg);
  }

  .retry-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .retry-btn:hover { border-color: var(--fg); color: var(--fg); }

  /* ── Port Grid ──────────────────────────────────── */
  .port-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .port-grid-label {
    grid-column: 1 / -1;
    font-family: var(--serif);
    font-size: 11px;
    font-style: italic;
    color: var(--fg-dim);
    margin-bottom: 2px;
  }

  .port-cell {
    text-align: center;
    padding: 4px 2px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 9px;
    font-variant-numeric: tabular-nums;
    color: var(--fg-dim);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .port-cell.scanning {
    border-color: var(--warn);
    color: var(--warn);
    animation: port-scan 0.8s ease-in-out infinite alternate;
  }

  @keyframes port-scan {
    from { background: transparent; }
    to { background: var(--warn-soft); }
  }

  .port-cell.tried {
    opacity: 0.4;
  }

  .port-cell.active {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-soft);
    font-weight: 500;
  }

  .port-cell.fc-active {
    border-color: var(--warn);
    color: var(--warn);
    background: var(--warn-soft);
  }

  .port-cell.just-connected {
    animation: port-connect 0.5s ease-out;
  }

  @keyframes port-connect {
    0% { transform: scale(1); }
    40% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* ── Tabs ───────────────────────────────────────── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 6px;
    text-align: center;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--fg-dim);
    border: none;
    border-bottom: 1.5px solid transparent;
    background: none;
    font-family: var(--mono);
    transition: all 0.15s;
  }

  .tab:hover { color: var(--fg-muted); }
  .tab.active { color: var(--fg); border-bottom-color: var(--fg); }

  /* ── Panels ─────────────────────────────────────── */
  .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .panel.active { display: flex; }

  /* ── Log Panel ──────────────────────────────────── */
  .log-toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .log-filter {
    font-family: var(--mono);
    font-size: 8px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: none;
    color: var(--fg-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .log-filter.active { color: var(--fg); border-color: var(--fg-muted); background: var(--bg-hover); }
  .log-filter.active[data-level="ok"] { color: var(--green); border-color: var(--green); background: var(--green-soft); }
  .log-filter.active[data-level="warn"] { color: var(--warn); border-color: var(--warn); background: var(--warn-soft); }
  .log-filter.active[data-level="err"] { color: var(--error); border-color: var(--error); background: var(--rose-soft); }

  .log-spacer { flex: 1; }

  .log-counter-text {
    font-size: 8px;
    color: var(--fg-dim);
    font-variant-numeric: tabular-nums;
  }

  .log-clear-btn {
    font-family: var(--mono);
    font-size: 8px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: none;
    color: var(--fg-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .log-clear-btn:hover { color: var(--error); border-color: var(--error); }

  .log {
    flex: 1;
    overflow-y: auto;
    padding: 2px 0;
  }

  .log-entry {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 2px 12px;
    font-size: 10px;
    position: relative;
    animation: log-enter 0.15s ease-out;
  }

  .log-entry.filtered { display: none; }

  @keyframes log-enter {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-entry:hover { background: var(--bg-hover); }

  .log-entry:hover .log-copy {
    opacity: 1;
  }

  .log-copy {
    position: absolute;
    right: 8px;
    top: 2px;
    opacity: 0;
    font-size: 8px;
    color: var(--fg-dim);
    cursor: pointer;
    padding: 1px 4px;
    border-radius: 2px;
    transition: opacity 0.1s;
  }
  .log-copy:hover { color: var(--fg); }

  .log-time {
    color: var(--fg-dim);
    flex-shrink: 0;
    font-size: 9px;
    font-variant-numeric: tabular-nums;
  }

  .log-icon {
    flex-shrink: 0;
    width: 10px;
    text-align: center;
    font-weight: 600;
  }

  .log-msg { flex: 1; word-break: break-word; color: var(--fg); }

  .log-entry.ok .log-icon { color: var(--green); }
  .log-entry.warn .log-icon { color: var(--warn); }
  .log-entry.err .log-icon { color: var(--error); }
  .log-entry.info .log-icon { color: var(--fg-dim); }

  .log-entry .log-detail {
    flex-basis: 100%;
    font-size: 9px;
    color: var(--fg-muted);
    margin-top: 1px;
    padding-left: 16px;
    word-break: break-all;
    max-height: 80px;
    overflow-y: auto;
    cursor: pointer;
  }

  .log-detail.collapsed {
    max-height: 14px;
    overflow: hidden;
    opacity: 0.6;
  }

  .log-detail.collapsed::after {
    content: ' ...';
    color: var(--fg-dim);
  }

  /* ── Actions Panel ──────────────────────────────── */
  .actions {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
  }

  .action-section {
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    color: var(--fg-dim);
    margin-top: 10px;
    margin-bottom: 4px;
  }

  .action-section:first-child { margin-top: 0; }

  .action-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .action-pill {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--fg-muted);
    background: none;
    transition: all 0.15s;
    white-space: nowrap;
    position: relative;
  }

  .action-pill:hover {
    border-color: var(--fg);
    color: var(--fg);
    background: var(--bg-hover);
  }

  .action-pill:active { transform: scale(0.97); }

  .action-pill.offline {
    opacity: 0.3;
    pointer-events: none;
  }

  .action-pill.loading {
    color: var(--warn);
    border-color: var(--warn);
    pointer-events: none;
  }

  .action-pill.loading::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    height: 1.5px;
    background: var(--warn);
    animation: pill-load 1.2s ease-in-out infinite;
    border-radius: 0 0 12px 12px;
  }

  @keyframes pill-load {
    0% { width: 0; left: 0; }
    50% { width: 100%; left: 0; }
    100% { width: 0; left: 100%; }
  }

  /* ── Selection Panel ────────────────────────────── */
  .sel-panel {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
  }

  .sel-empty {
    text-align: center;
    color: var(--fg-dim);
    padding: 30px 20px;
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    line-height: 2;
    border: 1px dashed var(--border);
    border-radius: 6px;
    margin: 10px 0;
  }

  .sel-node {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    background: var(--bg-card);
  }

  .sel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .sel-name { font-weight: 500; font-size: 10px; }
  .sel-type {
    font-size: 8px;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sel-section {
    font-family: var(--serif);
    font-size: 10px;
    font-style: italic;
    color: var(--fg-dim);
    margin: 6px 0 2px;
  }

  .sel-props {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1px 8px;
    font-size: 9px;
    color: var(--fg-muted);
  }

  .sel-props .k { color: var(--fg); font-weight: 500; }

  .sel-fill-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--fg-muted);
    margin: 2px 0;
  }

  .sel-fill-swatch {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Scrollbar ──────────────────────────────────── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #ccc; }

  /* ── Minimize ───────────────────────────────────── */
  body.minimized .stats-row,
  body.minimized .conn-card,
  body.minimized .port-grid,
  body.minimized .tabs,
  body.minimized .panel { display: none !important; }
  body.minimized { height: auto; }
  body.minimized .top-bar { border-bottom: none; }

  /* ── Hidden compat ──────────────────────────────── */
  .status-detail { display: none; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <div class="brand">
    <svg class="brand-icon dead" id="statusDot" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
      <circle cx="7" cy="4" r="1.2" fill="#c0392b"/>
      <circle cx="4.5" cy="5.5" r="1.2" fill="#c0392b"/>
      <circle cx="9.5" cy="5.5" r="1.2" fill="#c0392b"/>
      <circle cx="5.5" cy="3.2" r="1.2" fill="#d35649"/>
      <circle cx="8.5" cy="3.2" r="1.2" fill="#d35649"/>
      <circle cx="7" cy="6" r="1.6" fill="#a02018"/>
      <line x1="7" y1="7.5" x2="7" y2="12.5" stroke="#6b8a6b" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="7" y1="10" x2="5" y2="8.5" stroke="#6b8a6b" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="7" y1="11" x2="9" y2="9.5" stroke="#6b8a6b" stroke-width="0.8" stroke-linecap="round"/>
    </svg>
    <span class="brand-name">memoire</span>
    <span class="brand-status dead" id="statusText">offline</span>
  </div>
  <div class="top-right">
    <div class="file-name" id="fileName"></div>
    <span class="conn-quality disconnected" id="connQuality" title="Disconnected"></span>
    <button class="minimize-btn" id="minimizeBtn" onclick="toggleMinimize()" title="Minimize">_</button>
  </div>
</div>

<!-- Stats Row -->
<div class="stats-row" id="statsRow">
  <div class="stat-card">
    <div class="stat-label">Port</div>
    <div class="stat-value" id="detailPort">--</div>
    <div class="stat-sub" id="connNameSub">bridge</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Events</div>
    <div class="stat-value" id="statEvents">0</div>
    <div class="stat-sub" id="statEventsBreakdown">--</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Uptime</div>
    <div class="stat-value" id="logSession">0:00</div>
    <div class="stat-sub">session</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Ping</div>
    <div class="stat-value" id="detailLatency">--</div>
    <div class="stat-sub" id="pingQuality">waiting</div>
  </div>
</div>

<!-- Connection Card (offline/scanning only) -->
<div class="conn-card" id="connCard"></div>

<!-- Port Grid -->
<div class="port-grid" id="portGrid">
  <div class="port-grid-label">Ports</div>
  <div class="port-cell" id="port-9223">9223</div>
  <div class="port-cell" id="port-9224">9224</div>
  <div class="port-cell" id="port-9225">9225</div>
  <div class="port-cell" id="port-9226">9226</div>
  <div class="port-cell" id="port-9227">9227</div>
  <div class="port-cell" id="port-9228">9228</div>
  <div class="port-cell" id="port-9229">9229</div>
  <div class="port-cell" id="port-9230">9230</div>
  <div class="port-cell" id="port-9231">9231</div>
  <div class="port-cell" id="port-9232">9232</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="activity" onclick="switchTab('activity')">Log</button>
  <button class="tab" data-tab="actions" onclick="switchTab('actions')">Actions</button>
  <button class="tab" data-tab="selection" onclick="switchTab('selection')">Selection</button>
</div>

<!-- Activity Panel -->
<div class="panel active" id="panel-activity">
  <div class="log-toolbar">
    <button class="log-filter active" data-level="ok" onclick="toggleFilter('ok')">+</button>
    <button class="log-filter active" data-level="warn" onclick="toggleFilter('warn')">!</button>
    <button class="log-filter active" data-level="err" onclick="toggleFilter('err')">x</button>
    <button class="log-filter active" data-level="info" onclick="toggleFilter('info')">.</button>
    <span class="log-spacer"></span>
    <span class="log-counter-text" id="logStats">0</span>
    <button class="log-clear-btn" onclick="clearLog()">clear</button>
  </div>
  <div class="log" id="logEl"></div>
</div>

<!-- Actions Panel -->
<div class="panel" id="panel-actions">
  <div class="actions" id="actionsEl">
    <div class="action-section">Design System</div>
    <div class="action-pills">
      <button class="action-pill offline" data-action="pull-tokens" onclick="act('pull-tokens',this)">Tokens</button>
      <button class="action-pill offline" data-action="pull-components" onclick="act('pull-components',this)">Components</button>
      <button class="action-pill offline" data-action="pull-styles" onclick="act('pull-styles',this)">Styles</button>
    </div>
    <div class="action-section">Research</div>
    <div class="action-pills">
      <button class="action-pill offline" data-action="stickies" onclick="act('stickies',this)">Stickies</button>
    </div>
    <div class="action-section">Inspect</div>
    <div class="action-pills">
      <button class="action-pill offline" data-action="selection-info" onclick="act('selection-info',this)">Selection</button>
      <button class="action-pill offline" data-action="page-tree" onclick="act('page-tree',this)">Page Tree</button>
    </div>
    <div class="action-section">Sync</div>
    <div class="action-pills">
      <button class="action-pill offline" data-action="full-sync" onclick="act('full-sync',this)">Full Sync</button>
    </div>
  </div>
</div>

<!-- Selection Panel -->
<div class="panel" id="panel-selection">
  <div class="sel-panel" id="selPanel">
    <div class="sel-empty">Select something in Figma<br>to inspect it here</div>
  </div>
</div>

<!-- Hidden compat elements -->
<div class="status-detail" id="statusDetail">
  <span id="detailClients" style="display:none">0</span>
  <span id="detailQueue" style="display:none">0</span>
</div>

<script>
// ── State ───────────────────────────────────────────
let ws = null;
let fcWs = null;
let status = 'dead';
let fcStatus = 'dead';
let connPort = 0;
let fcPort = 0;
let connName = '';
let connectedAt = null;
let fileInfo = {};
let scanTimer = null;
let minimized = false;
let logCount = { total: 0, ok: 0, warn: 0, err: 0, info: 0 };
let sessionStart = Date.now();
let sessionTimer = null;
const PORT_START = 9223;
const PORT_END = 9232;
let currentScanPort = PORT_START;

// Port memory — remember last successful ports for instant reconnect
let lastMemoirePort = 0;
let lastFcPort = 0;
try {
  lastMemoirePort = parseInt(localStorage.getItem('memoire_last_port') || '0');
  lastFcPort = parseInt(localStorage.getItem('memoire_last_fc_port') || '0');
} catch {}

// Port scan state for grid visualization
const portStates = {};
for (let p = PORT_START; p <= PORT_END; p++) portStates[p] = 'idle';

// Pending figma-console commands
const fcPending = new Map();

// Active action pills for loading state
const activeActions = new Set();

// Log filter state
const logFilters = { ok: true, warn: true, err: true, info: true };

// ── Heartbeat / Keep-alive ──────────────────────────
let memoireHeartbeat = null;
let fcHeartbeat = null;
let memoireMissedPongs = 0;
let fcMissedPongs = 0;
const HEARTBEAT_MS = 10000;
const MAX_MISSED = 3;
let reconnectDelay = 1000;
const MAX_RECONNECT_DELAY = 16000;

// ── Latency Tracking ────────────────────────────────
let memoirePingSentAt = 0;
let memoireLatencyHistory = [];
let lastPingLatency = 0;
const LATENCY_HISTORY_SIZE = 10;
const HIGH_LATENCY_THRESHOLD = 500;
let latencyWarned = false;

// ── Throughput Tracking ─────────────────────────────
let msgsSent = 0;
let msgsRecv = 0;
let lastMsgsSent = 0;
let lastMsgsRecv = 0;

function recordLatency(ms) {
  lastPingLatency = ms;
  memoireLatencyHistory.push(ms);
  if (memoireLatencyHistory.length > LATENCY_HISTORY_SIZE) memoireLatencyHistory.shift();
  const avg = memoireLatencyHistory.reduce((a, b) => a + b, 0) / memoireLatencyHistory.length;
  if (avg > HIGH_LATENCY_THRESHOLD && !latencyWarned) {
    latencyWarned = true;
    log('warn', 'High avg latency: ' + avg.toFixed(0) + 'ms');
    updateConnectionQuality('degraded');
  } else if (avg <= HIGH_LATENCY_THRESHOLD && latencyWarned) {
    latencyWarned = false;
    updateConnectionQuality('healthy');
  }
  updateStatusBar();
}

// ── Connection Quality ──────────────────────────────
let connQualityState = 'disconnected';

function updateConnectionQuality(state) {
  connQualityState = state;
  const dot = document.getElementById('connQuality');
  if (dot) {
    dot.className = 'conn-quality ' + state;
    dot.title = { healthy: 'Healthy', degraded: 'High latency', reconnecting: 'Reconnecting...', disconnected: 'Disconnected' }[state] || state;
  }
}

function updateStatusBar() {
  const portEl = document.getElementById('detailPort');
  const latencyEl = document.getElementById('detailLatency');
  const pingQEl = document.getElementById('pingQuality');
  const connNameEl = document.getElementById('connNameSub');
  const evtBreakdownEl = document.getElementById('statEventsBreakdown');

  if (portEl) portEl.textContent = connPort > 0 ? ':' + connPort : '--';
  if (connNameEl) connNameEl.textContent = connName || (status === 'live' ? 'bridge' : '--');

  if (latencyEl) {
    if (lastPingLatency > 0) {
      latencyEl.textContent = lastPingLatency + 'ms';
    } else {
      latencyEl.textContent = '--';
    }
  }

  if (pingQEl) {
    if (lastPingLatency > 0) {
      pingQEl.textContent = lastPingLatency < 100 ? 'healthy' : lastPingLatency < HIGH_LATENCY_THRESHOLD ? 'ok' : 'slow';
    } else {
      pingQEl.textContent = status === 'live' ? 'measuring' : 'waiting';
    }
  }

  if (evtBreakdownEl) {
    evtBreakdownEl.textContent = logCount.ok + '+ ' + logCount.warn + '! ' + logCount.err + 'x';
  }

  const evtEl = document.getElementById('statEvents');
  if (evtEl) {
    const prev = evtEl.textContent;
    evtEl.textContent = String(logCount.total);
    if (prev !== String(logCount.total)) flashChanged(evtEl);
  }

  updatePortGrid();
}

function flashChanged(el) {
  el.classList.add('changed');
  setTimeout(() => el.classList.remove('changed'), 400);
}

function updatePortGrid() {
  for (let p = PORT_START; p <= PORT_END; p++) {
    const cell = document.getElementById('port-' + p);
    if (!cell) continue;
    let cls = 'port-cell';
    if (p === connPort) cls += ' active';
    else if (p === fcPort) cls += ' fc-active';
    else if (portStates[p] === 'scanning') cls += ' scanning';
    else if (portStates[p] === 'tried') cls += ' tried';
    cell.className = cls;
  }
}

// ── Action pill state ───────────────────────────────
function updateActionPills() {
  document.querySelectorAll('.action-pill').forEach(pill => {
    const action = pill.dataset.action;
    if (status !== 'live') {
      pill.classList.add('offline');
      pill.classList.remove('loading');
    } else {
      pill.classList.remove('offline');
      if (activeActions.has(action)) pill.classList.add('loading');
      else pill.classList.remove('loading');
    }
  });
}

function completeAction(actionId) {
  const action = actionId.replace('action:', '').replace('sync:', '');
  activeActions.delete(action);
  // Also clear full-sync sub-actions
  if (action === 'tokens' || action === 'components' || action === 'styles') {
    activeActions.delete('full-sync');
  }
  updateActionPills();
}

// ── Command Queue ───────────────────────────────────
const commandQueue = [];
const MAX_QUEUED_COMMANDS = 50;

function queueCommand(msg) {
  if (commandQueue.length >= MAX_QUEUED_COMMANDS) commandQueue.shift();
  commandQueue.push(msg);
  log('info', 'Queued (' + commandQueue.length + '): ' + (msg.method || msg.type || '?'));
}

function replayCommandQueue() {
  if (commandQueue.length === 0) return;
  const count = commandQueue.length;
  log('info', 'Replaying ' + count + ' queued command' + (count !== 1 ? 's' : '') + '...');
  while (commandQueue.length > 0) {
    parent.postMessage({ pluginMessage: commandQueue.shift() }, '*');
  }
  log('ok', 'Replayed ' + count);
}

function startMemoireHeartbeat() {
  clearInterval(memoireHeartbeat);
  memoireMissedPongs = 0;
  memoireLatencyHistory = [];
  latencyWarned = false;
  memoireHeartbeat = setInterval(() => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    memoireMissedPongs++;
    if (memoireMissedPongs >= MAX_MISSED) {
      log('warn', 'Heartbeat timeout — reconnecting');
      updateConnectionQuality('disconnected');
      ws.close();
      return;
    }
    memoirePingSentAt = Date.now();
    try { ws.send(JSON.stringify({ type: 'ping' })); msgsSent++; } catch {}
  }, HEARTBEAT_MS);
}

function startFcHeartbeat() {
  clearInterval(fcHeartbeat);
  fcMissedPongs = 0;
  fcHeartbeat = setInterval(() => {
    if (!fcWs || fcWs.readyState !== WebSocket.OPEN) return;
    fcMissedPongs++;
    if (fcMissedPongs >= MAX_MISSED) {
      log('warn', 'FC heartbeat timeout — reconnecting');
      fcWs.close();
      return;
    }
    try { fcWs.send(JSON.stringify({ type: 'ping' })); msgsSent++; } catch {}
  }, HEARTBEAT_MS);
}

// ── Smart Scanning ──────────────────────────────────
// Phase 1: Try remembered ports first (fast).
// Phase 2: Parallel batch scan remaining ports.

function scan() {
  if (status === 'live' && fcStatus === 'live') return;
  if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }

  // Reset port states
  for (let p = PORT_START; p <= PORT_END; p++) {
    if (p !== connPort && p !== fcPort) portStates[p] = 'idle';
  }
  updatePortGrid();

  if (status !== 'live') setStatus('scanning');

  // Phase 1: Try remembered ports first
  const priorityPorts = [];
  if (lastMemoirePort >= PORT_START && lastMemoirePort <= PORT_END && lastMemoirePort !== connPort) {
    priorityPorts.push(lastMemoirePort);
  }
  if (lastFcPort >= PORT_START && lastFcPort <= PORT_END && lastFcPort !== fcPort && lastFcPort !== lastMemoirePort) {
    priorityPorts.push(lastFcPort);
  }

  if (priorityPorts.length > 0) {
    let resolved = 0;
    const total = priorityPorts.length;
    for (const port of priorityPorts) {
      tryPort(port, () => {
        resolved++;
        if (resolved >= total) {
          // Phase 2: scan remaining if still needed
          if (status !== 'live' || fcStatus !== 'live') {
            scanRemaining(priorityPorts);
          }
        }
      });
    }
    // Fallback: if priority ports don't respond in 1.5s, start full scan
    setTimeout(() => {
      if (status !== 'live') scanRemaining(priorityPorts);
    }, 1500);
  } else {
    scanRemaining([]);
  }
}

function scanRemaining(skip) {
  const ports = [];
  for (let p = PORT_START; p <= PORT_END; p++) {
    if (!skip.includes(p) && p !== connPort && p !== fcPort && portStates[p] !== 'tried') {
      ports.push(p);
    }
  }
  // Scan in batches of 3
  scanBatch(ports, 0);
}

function scanBatch(ports, idx) {
  if (idx >= ports.length) {
    if (status !== 'live') setStatus('dead');
    renderConn();
    scheduleReconnect();
    return;
  }

  const batch = ports.slice(idx, idx + 3);
  let done = 0;
  for (const port of batch) {
    tryPort(port, () => {
      done++;
      if (done >= batch.length) {
        if (status === 'live' && fcStatus === 'live') return; // both connected
        scanBatch(ports, idx + 3);
      }
    });
  }
  // Safety timeout for batch
  setTimeout(() => {
    if (done < batch.length) {
      done = batch.length; // force advance
      if (status !== 'live' || fcStatus !== 'live') scanBatch(ports, idx + 3);
    }
  }, 2500);
}

function tryPort(port, onDone) {
  portStates[port] = 'scanning';
  updatePortGrid();

  try {
    const sock = new WebSocket('ws://localhost:' + port);
    let identified = false;
    let timeout = null;

    timeout = setTimeout(() => {
      if (!identified) {
        identified = true;
        portStates[port] = 'tried';
        updatePortGrid();
        try { sock.close(); } catch {}
        onDone();
      }
    }, 2000);

    function cleanup() { if (timeout) { clearTimeout(timeout); timeout = null; } }

    sock.onopen = () => {
      // Wait for protocol identification
      setTimeout(() => {
        if (!identified) {
          identified = true;
          cleanup();
          portStates[port] = 'tried';
          updatePortGrid();
          try { sock.close(); } catch {}
          onDone();
        }
      }, 800);
    };

    sock.onmessage = (e) => {
      let data;
      try { data = JSON.parse(e.data); } catch { return; }
      msgsRecv++;

      if (sock === ws) {
        memoireMissedPongs = 0;
        if (memoirePingSentAt > 0) {
          recordLatency(Date.now() - memoirePingSentAt);
          memoirePingSentAt = 0;
        }
      }
      if (sock === fcWs) fcMissedPongs = 0;

      if (!identified) {
        identified = true;
        cleanup();
        if (data.type === 'SERVER_HELLO') {
          adoptAsFigmaConsole(sock, port, data);
        } else if (data.type === 'identify' || data.type === 'pong' || data.name) {
          adoptAsMemoire(sock, port);
          handleMsg(data);
        } else {
          portStates[port] = 'tried';
          updatePortGrid();
          try { sock.close(); } catch {}
        }
        onDone();
        return;
      }

      if (sock === ws) handleMsg(data);
      else if (sock === fcWs) handleFcMsg(data);
    };

    sock.onclose = () => {
      cleanup();
      if (sock === ws) {
        ws = null;
        connPort = 0;
        clearInterval(memoireHeartbeat);
        setStatus('dead');
        renderConn();
        log('warn', 'Disconnected');
        scheduleReconnect();
      } else if (sock === fcWs) {
        fcWs = null;
        fcPort = 0;
        clearInterval(fcHeartbeat);
        fcStatus = 'dead';
        renderConn();
        log('warn', 'FC disconnected');
        scheduleReconnect();
      } else if (!identified) {
        identified = true;
        portStates[port] = 'tried';
        updatePortGrid();
        onDone();
      }
    };

    sock.onerror = () => {
      cleanup();
      if (!identified) {
        identified = true;
        portStates[port] = 'tried';
        updatePortGrid();
        try { sock.close(); } catch {}
        onDone();
      }
    };
  } catch {
    portStates[port] = 'tried';
    updatePortGrid();
    onDone();
  }
}

function scheduleReconnect() {
  if (scanTimer) return;
  const jitter = Math.random() * 500;
  const delay = reconnectDelay + jitter;
  log('info', 'Reconnecting in ' + (delay / 1000).toFixed(1) + 's...');
  updateConnectionQuality('reconnecting');
  scanTimer = setTimeout(() => {
    scanTimer = null;
    scan();
  }, delay);
  reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
}

function resetBackoff() { reconnectDelay = 1000; }

function adoptAsMemoire(sock, port) {
  if (status === 'live') { sock.close(); return; }

  ws = sock;
  connPort = port;
  connectedAt = new Date();
  portStates[port] = 'active';
  setStatus('live');
  resetBackoff();
  startMemoireHeartbeat();
  updateConnectionQuality('healthy');
  renderConn();
  updateActionPills();
  log('ok', 'Connected on :' + port);

  // Remember for fast reconnect
  try { localStorage.setItem('memoire_last_port', String(port)); lastMemoirePort = port; } catch {}

  // Flash port cell
  const cell = document.getElementById('port-' + port);
  if (cell) { cell.classList.add('just-connected'); setTimeout(() => cell.classList.remove('just-connected'), 500); }

  // Flash brand icon
  const icon = document.getElementById('statusDot');
  if (icon) { icon.classList.add('just-connected'); setTimeout(() => icon.classList.remove('just-connected'), 600); }

  if (commandQueue.length > 0) setTimeout(() => replayCommandQueue(), 200);

  sock.send(JSON.stringify({
    type: 'bridge-hello',
    plugin: 'memoire',
    file: fileInfo.file || 'unknown',
    fileKey: fileInfo.fileKey || '',
    editor: fileInfo.editor || 'figma',
  }));
  msgsSent++;
}

function adoptAsFigmaConsole(sock, port, hello) {
  if (fcStatus === 'live') { sock.close(); return; }

  fcWs = sock;
  fcPort = port;
  fcStatus = 'live';
  portStates[port] = 'fc-active';
  resetBackoff();
  startFcHeartbeat();
  renderConn();
  updatePortGrid();
  log('ok', 'FC MCP on :' + port);

  try { localStorage.setItem('memoire_last_fc_port', String(port)); lastFcPort = port; } catch {}

  sock.send(JSON.stringify({
    type: 'FILE_INFO',
    data: {
      fileName: fileInfo.file || figmaFileName || 'unknown',
      fileKey: fileInfo.fileKey || '',
      currentPage: fileInfo.page || '',
      currentPageId: '',
      editorType: fileInfo.editor || 'figma',
      pluginVersion: '1.0.0',
    }
  }));
  msgsSent++;
}

function disconnect() {
  clearInterval(memoireHeartbeat);
  clearInterval(fcHeartbeat);
  clearTimeout(scanTimer);
  scanTimer = null;
  if (ws) ws.close();
  ws = null; connPort = 0;
  setStatus('dead');
  if (fcWs) fcWs.close();
  fcWs = null; fcPort = 0; fcStatus = 'dead';
  lastPingLatency = 0;
  memoireLatencyHistory = [];
  updateConnectionQuality('disconnected');
  updateActionPills();
  renderConn();
}

// ── Figma Console MCP Protocol ──────────────────────
window.__figmaVariablesData = null;
window.__figmaVariablesReady = false;
window.__figmaPendingRequests = new Map();

function handleFcMsg(msg) {
  if (msg.id && msg.method) {
    fcPending.set(msg.id, true);
    parent.postMessage({ pluginMessage: Object.assign({ type: msg.method, requestId: msg.id }, msg.params || {}) }, '*');
    log('info', 'FC ' + msg.method);
    return;
  }
  if (msg.type === 'SERVER_HELLO' || msg.type === 'RESIZE_UI' || msg.type === 'BOOT_LOAD_UI' || msg.type === 'RELOAD_UI' || msg.type === 'BOOT_FALLBACK') return;
}

function fcBroadcast(data) {
  if (fcWs && fcWs.readyState === WebSocket.OPEN) {
    fcWs.send(JSON.stringify(data));
    msgsSent++;
  }
}

let figmaFileName = '';

function setStatus(s) {
  status = s;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'brand-icon ' + s;
  txt.className = 'brand-status ' + s;

  if (s === 'live') {
    txt.textContent = 'connected';
    updateConnectionQuality('healthy');
  } else if (s === 'scanning') {
    txt.textContent = 'scanning';
    updateConnectionQuality('reconnecting');
  } else {
    txt.textContent = 'offline';
    updateConnectionQuality('disconnected');
  }
  updateActionPills();
  updateStatusBar();
}

// ── Connection Card ─────────────────────────────────
function renderConn() {
  const el = document.getElementById('connCard');
  if (status === 'live') {
    el.className = 'conn-card';
    el.innerHTML = '';
  } else if (status === 'scanning') {
    el.className = 'conn-card visible';
    el.innerHTML = '<div class="help-text">Scanning for Memoire...</div>';
  } else {
    el.className = 'conn-card visible';
    el.innerHTML = '<div class="help-text">Run <code>memi connect</code> in terminal</div><button class="retry-btn" onclick="scan()">Retry</button>';
  }
  updateStatusBar();
}

// ── Message Handling ────────────────────────────────
function handleMsg(msg) {
  if (msg.type === 'command' && msg.id && msg.method) {
    parent.postMessage({ pluginMessage: { type: 'command', id: msg.id, method: msg.method, params: msg.params || {} } }, '*');
    log('info', 'CMD ' + msg.method);
    return;
  }
  if (msg.type === 'identify') {
    connName = msg.name || connName;
    renderConn();
    log('ok', 'Identified: ' + (msg.name || 'Memoire'));
    return;
  }
  if (msg.type === 'chat') { log('info', '[' + (msg.from || 'memoire') + '] ' + msg.text); return; }
  if (msg.type === 'event') {
    const level = msg.level === 'success' ? 'ok' : msg.level === 'error' ? 'err' : msg.level || 'info';
    log(level, msg.message, msg.data || null);
    return;
  }
  if (msg.type === 'error') { log('err', msg.message, msg.details || null); return; }
  log('info', 'MSG:' + msg.type, msg.data || null);
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
    msgsSent++;
    return true;
  }
  if (data && (data.type === 'command' || data.method)) queueCommand(data);
  return false;
}

// ── Actions ─────────────────────────────────────────
function act(action, pill) {
  if (status !== 'live') { log('warn', 'Not connected'); return; }

  activeActions.add(action);
  updateActionPills();
  log('info', 'Running: ' + action);

  const cmds = {
    'pull-tokens': { method: 'getVariables', params: {} },
    'pull-components': { method: 'getComponents', params: {} },
    'pull-styles': { method: 'getStyles', params: {} },
    'stickies': { method: 'getStickies', params: {} },
    'selection-info': { method: 'getSelection', params: {} },
    'page-tree': { method: 'getPageTree', params: { depth: 2 } },
  };

  if (action === 'full-sync') {
    parent.postMessage({ pluginMessage: { type: 'command', id: 'sync:tokens', method: 'getVariables', params: {} } }, '*');
    parent.postMessage({ pluginMessage: { type: 'command', id: 'sync:components', method: 'getComponents', params: {} } }, '*');
    parent.postMessage({ pluginMessage: { type: 'command', id: 'sync:styles', method: 'getStyles', params: {} } }, '*');
    return;
  }

  if (action === 'selection-info') {
    parent.postMessage({ pluginMessage: { type: 'command', id: 'action:selection', method: 'getSelection', params: {} } }, '*');
    switchTab('selection');
    return;
  }

  const cmd = cmds[action];
  if (cmd) parent.postMessage({ pluginMessage: { type: 'command', id: 'action:' + action, method: cmd.method, params: cmd.params } }, '*');
}

// ── Selection Rendering ─────────────────────────────
function renderSel(nodes) {
  const panel = document.getElementById('selPanel');
  if (!nodes || nodes.length === 0) {
    panel.innerHTML = '<div class="sel-empty">Select something in Figma<br>to inspect it here</div>';
    return;
  }

  panel.innerHTML = '';
  for (const n of nodes) {
    const el = document.createElement('div');
    el.className = 'sel-node';

    let html = '<div class="sel-header"><span class="sel-name">' + esc(n.name) + '</span><span class="sel-type">' + n.type + '</span></div>';

    // Position & Size
    html += '<div class="sel-section">Position & Size</div><div class="sel-props">';
    if (n.x != null) html += '<span class="k">x</span><span>' + n.x.toFixed(0) + '</span>';
    if (n.y != null) html += '<span class="k">y</span><span>' + n.y.toFixed(0) + '</span>';
    if (n.width != null) html += '<span class="k">w</span><span>' + n.width.toFixed(0) + '</span>';
    if (n.height != null) html += '<span class="k">h</span><span>' + n.height.toFixed(0) + '</span>';
    if (n.rotation) html += '<span class="k">rotation</span><span>' + n.rotation.toFixed(1) + '</span>';
    html += '</div>';

    // Appearance
    if (n.fills || n.opacity != null || n.cornerRadius != null) {
      html += '<div class="sel-section">Appearance</div>';
      if (n.opacity != null && n.opacity < 1) {
        html += '<div class="sel-props"><span class="k">opacity</span><span>' + (n.opacity * 100).toFixed(0) + '%</span></div>';
      }
      if (n.cornerRadius != null) {
        html += '<div class="sel-props"><span class="k">radius</span><span>' + n.cornerRadius + '</span></div>';
      }
      if (n.fills && n.fills.length > 0) {
        for (const f of n.fills) {
          if (f.color) {
            const r = Math.round(f.color.r * 255);
            const g = Math.round(f.color.g * 255);
            const b = Math.round(f.color.b * 255);
            const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
            html += '<div class="sel-fill-row"><span class="sel-fill-swatch" style="background:' + hex + '"></span>' + hex + ' <span style="color:var(--fg-dim)">' + f.type + '</span></div>';
          }
        }
      }
    }

    // Content
    if (n.characters) {
      html += '<div class="sel-section">Content</div><div class="sel-props"><span class="k">text</span><span>' + esc(n.characters.slice(0, 80)) + '</span></div>';
    }

    // Meta
    html += '<div class="sel-section">Meta</div><div class="sel-props"><span class="k">id</span><span>' + n.id + '</span>';
    if (n.childCount) html += '<span class="k">children</span><span>' + n.childCount + '</span>';
    html += '</div>';

    el.innerHTML = html;
    panel.appendChild(el);
  }
}

// ── Log ─────────────────────────────────────────────
function log(level, msg, detail) {
  const el = document.getElementById('logEl');
  const icons = { ok: '+', warn: '!', err: 'x', info: '.' };
  const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;

  const entry = document.createElement('div');
  entry.className = 'log-entry ' + level;
  if (!logFilters[level]) entry.classList.add('filtered');
  entry.dataset.level = level;

  const msgText = esc(msg);
  let html =
    '<span class="log-time">' + timeStr() + '</span>' +
    '<span class="log-icon">' + (icons[level] || '.') + '</span>' +
    '<span class="log-msg">' + msgText + '</span>' +
    '<span class="log-copy" onclick="copyLog(this)" title="Copy">cp</span>';

  if (detail) {
    const detailStr = typeof detail === 'object' ? JSON.stringify(detail, null, 2) : String(detail);
    html += '<div class="log-detail collapsed" onclick="this.classList.toggle(\'collapsed\')">' + esc(detailStr) + '</div>';
  }

  entry.innerHTML = html;
  el.appendChild(entry);

  if (wasAtBottom) requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
  while (el.children.length > 500) el.removeChild(el.firstChild);

  logCount.total++;
  if (logCount[level] !== undefined) logCount[level]++;
  updateLogStats();
}

function copyLog(btn) {
  const entry = btn.parentElement;
  const msg = entry.querySelector('.log-msg');
  const detail = entry.querySelector('.log-detail');
  let text = msg ? msg.textContent : '';
  if (detail) text += '\n' + detail.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'ok';
    setTimeout(() => { btn.textContent = 'cp'; }, 800);
  });
}

function clearLog() {
  document.getElementById('logEl').innerHTML = '';
  logCount = { total: 0, ok: 0, warn: 0, err: 0, info: 0 };
  updateLogStats();
  log('info', 'Log cleared');
}

function toggleFilter(level) {
  logFilters[level] = !logFilters[level];
  const btn = document.querySelector('.log-filter[data-level="' + level + '"]');
  if (btn) btn.classList.toggle('active', logFilters[level]);

  document.querySelectorAll('.log-entry[data-level="' + level + '"]').forEach(entry => {
    entry.classList.toggle('filtered', !logFilters[level]);
  });
}

function updateLogStats() {
  const stats = document.getElementById('logStats');
  if (stats) stats.textContent = String(logCount.total);

  const evtEl = document.getElementById('statEvents');
  if (evtEl) {
    const prev = evtEl.textContent;
    evtEl.textContent = String(logCount.total);
    if (prev !== String(logCount.total)) flashChanged(evtEl);
  }

  const breakdown = document.getElementById('statEventsBreakdown');
  if (breakdown) breakdown.textContent = logCount.ok + '+ ' + logCount.warn + '! ' + logCount.err + 'x';
}

function updateSessionTimer() {
  const el = document.getElementById('logSession');
  if (el) {
    const s = Math.floor((Date.now() - sessionStart) / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    el.textContent = m + ':' + String(sec).padStart(2, '0');
  }
}

function toggleMinimize() {
  minimized = !minimized;
  document.body.classList.toggle('minimized', minimized);
  const btn = document.getElementById('minimizeBtn');
  btn.textContent = minimized ? '+' : '_';
  btn.title = minimized ? 'Expand' : 'Minimize';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab[data-tab="' + name + '"]').classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── Plugin Message Handler ──────────────────────────
onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  msgsRecv++;

  switch (msg.type) {
    case 'ready':
      log('ok', 'Plugin loaded — ' + (msg.data.pages || 0) + ' pages');
      break;

    case 'pong': {
      fileInfo = msg.data;
      figmaFileName = msg.data.file || '';
      document.getElementById('fileName').textContent = figmaFileName;
      break;
    }

    case 'VARIABLES_DATA': {
      window.__figmaVariablesData = msg.data;
      window.__figmaVariablesReady = true;
      fcBroadcast({ type: 'VARIABLES_DATA', data: msg.data });
      break;
    }

    case 'CONSOLE_CAPTURE': {
      fcBroadcast({ type: 'CONSOLE_CAPTURE', level: msg.level, message: msg.message, args: msg.args, timestamp: msg.timestamp });
      break;
    }

    case 'COMPONENT_DATA': {
      const cdRid = msg.requestId;
      if (cdRid && fcPending.has(cdRid)) {
        fcPending.delete(cdRid);
        fcBroadcast({ id: cdRid, result: msg.data });
        log('ok', 'FC component data');
      }
      break;
    }

    case 'COMPONENT_ERROR': {
      const ceRid = msg.requestId;
      if (ceRid && fcPending.has(ceRid)) {
        fcPending.delete(ceRid);
        fcBroadcast({ id: ceRid, error: msg.error });
        log('err', 'FC error: ' + msg.error);
      }
      break;
    }

    case 'selection-changed': {
      const nodes = msg.data.nodes || [];
      renderSel(nodes);
      send({ type: 'selection', data: msg.data });
      if (nodes.length > 0) {
        log('info', 'Selection: ' + nodes.length + ' — ' + nodes.map(n => n.name).join(', '));
      }
      fcBroadcast({ type: 'SELECTION_CHANGE', data: { selectedNodeIds: nodes.map(n => n.id), selectedNodeCount: nodes.length } });
      break;
    }

    case 'page-changed':
      log('info', 'Page > ' + msg.data.page);
      send({ type: 'page-changed', data: msg.data });
      fcBroadcast({ type: 'PAGE_CHANGE', data: { pageName: msg.data.page, pageId: msg.data.pageId || '' } });
      fcBroadcast({ type: 'FILE_INFO', data: { fileName: figmaFileName, fileKey: fileInfo.fileKey || '', currentPage: msg.data.page, currentPageId: msg.data.pageId || '', editorType: fileInfo.editor || 'figma', pluginVersion: '1.0.0' } });
      break;

    case 'document-changed': {
      const cc = msg.data.changes || 0;
      log('info', 'Doc changed — ' + cc + ' change' + (cc !== 1 ? 's' : ''));
      send({ type: 'document-changed', data: msg.data });
      fcBroadcast({ type: 'DOCUMENT_CHANGE', data: { hasNodeChanges: true, changeCount: cc, timestamp: Date.now() } });
      break;
    }

    case 'command-response': {
      const id = msg.id;
      const resultSize = msg.result ? JSON.stringify(msg.result).length : 0;
      const sizeLabel = resultSize > 1024 ? (resultSize / 1024).toFixed(1) + 'KB' : resultSize + 'B';

      // Complete action pill loading state
      if (id) completeAction(id);

      if (id && id.startsWith('fc:')) {
        const origId = fcPending.get(id);
        fcPending.delete(id);
        if (origId) {
          const resp = { id: origId };
          if (msg.error) { resp.error = msg.error; log('err', 'FC: ' + msg.error); }
          else { resp.result = msg.result; log('ok', 'FC (' + sizeLabel + ')'); }
          fcBroadcast(resp);
        }
        return;
      }

      if (id && !id.includes(':')) {
        if (send({ type: 'response', id, result: msg.result, error: msg.error })) {
          log('ok', id + ' (' + sizeLabel + ')');
        }
        if (msg.error) log('err', id + ': ' + msg.error);
        return;
      }

      if (id && id.startsWith('action:')) {
        const action = id.replace('action:', '');
        if (msg.error) log('err', action + ' failed', msg.error);
        else log('ok', action + ' (' + sizeLabel + ')');
        send({ type: 'action-result', action, result: msg.result, error: msg.error });
      }

      if (id && id.startsWith('sync:')) {
        const part = id.replace('sync:', '');
        if (msg.error) log('err', 'Sync ' + part + ' failed', msg.error);
        else log('ok', 'Synced ' + part + ' (' + sizeLabel + ')');
        send({ type: 'sync-data', part, result: msg.result, error: msg.error });
      }

      break;
    }

    default: {
      const mt = msg.type || '';
      if (mt.endsWith('_RESULT') && msg.requestId && fcPending.has(msg.requestId)) {
        fcPending.delete(msg.requestId);
        const resp = { id: msg.requestId };
        if (msg.success === false) {
          resp.error = msg.error || 'Unknown error';
          log('err', 'FC: ' + mt.replace('_RESULT', ''));
        } else {
          const result = {};
          for (const key in msg) {
            if (key !== 'type' && key !== 'requestId' && key !== 'success') result[key] = msg[key];
          }
          resp.result = result;
          log('ok', 'FC < ' + mt.replace('_RESULT', ''));
        }
        fcBroadcast(resp);
      } else if (mt === 'SELECTION_CHANGE' || mt === 'PAGE_CHANGE' || mt === 'DOCUMENT_CHANGE') {
        fcBroadcast(msg);
      }
      break;
    }
  }
};

// ── Helpers ─────────────────────────────────────────
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function timeStr() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
function timeSince(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

// ── Init ────────────────────────────────────────────
parent.postMessage({ pluginMessage: { type: 'ping' } }, '*');
renderConn();
log('info', 'Memoire starting...');

sessionTimer = setInterval(updateSessionTimer, 1000);
setTimeout(scan, 200);

// Auto-reconnect when Figma tab regains focus
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    parent.postMessage({ pluginMessage: { type: 'ping' } }, '*');
    if (status !== 'live') {
      resetBackoff();
      scan();
    }
  }
});
</script>
